server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  application:
    name: open-report-admin
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/open_report?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
      username: root
      password: root
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: open-report-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  mail:
    host: smtp.example.com
    port: 465
    username: noreply@example.com
    password: your-password
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
        transport:
          protocol: smtp

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.openreport.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: openreport-secret-key-1234567890-please-change-it
  expiration: 86400

knife4j:
  enable: true
  openapi:
    title: Open Report API
    description: 企业级类帆软报表平台管理端API
    version: 1.0.0
    concat: admin@openreport.com

open-report:
  ai:
    enabled: false
    provider: openai
    api-key: ${AI_API_KEY:}
    api-url: ${AI_API_URL:https://api.openai.com/v1/chat/completions}
    model: ${AI_MODEL:gpt-3.5-turbo}
    timeout: 60
    max-tokens: 2048
    temperature: 0.7
  email:
    from: noreply@example.com
    senderName: Open Report
  dingtalk:
    enabled: true
    timeout: 10000
